name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build aarch64-apple-darwin
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package
        run: |
          cd target/aarch64-apple-darwin/release
          tar czf memex-aarch64-apple-darwin.tar.gz memex
          shasum -a 256 memex-aarch64-apple-darwin.tar.gz > memex-aarch64-apple-darwin.tar.gz.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/aarch64-apple-darwin/release/memex-aarch64-apple-darwin.tar.gz
            target/aarch64-apple-darwin/release/memex-aarch64-apple-darwin.tar.gz.sha256
          generate_release_notes: true
